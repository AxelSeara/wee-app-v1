name: Bug report
description: Report a reproducible bug
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting. Please fill in enough detail so we can reproduce quickly.

  - type: textarea
    id: summary
    attributes:
      label: What happened?
      description: Clear and short description of the problem.
      placeholder: The app crashes when I submit a link from...
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Go to ...
        2. Click ...
        3. See error ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: input
    id: env
    attributes:
      label: Environment
      description: Browser, OS, device
      placeholder: Chrome 123 / macOS 14 / iPhone 15

  - type: textarea
    id: logs
    attributes:
      label: Logs / screenshots (optional)
      description: Paste stack traces or attach screenshots.
